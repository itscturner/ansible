---
# tasks file for storage

- name: Import assert.yml
  ansible.builtin.import_tasks:
    file: assert.yml
  run_once: true
  delegate_to: localhost

- name: Ensure required packages are installed
  ansible.builtin.package:
    name: "{{ storage_required_packages }}"
    state: present

- name: Include partition.yml
  ansible.builtin.include_tasks:
    file: partition.yml
  loop: "{{ storage_partitions }}"
  loop_control:
    loop_var: partition
  when:
    - storage_partitions is defined

- name: Include volume_group.yml
  ansible.builtin.include_tasks:
    file: volume_group.yml
  loop: "{{ storage_volume_groups }}"
  loop_control:
    loop_var: volume_group
  when:
    - storage_volume_groups is defined

- name: Include volume.yml
  ansible.builtin.include_tasks:
    file: volume.yml
  loop: "{{ storage_volumes }}"
  loop_control:
    loop_var: volume
  when:
    - storage_volumes is defined

- name: Include filesystem.yml
  ansible.builtin.include_tasks:
    file: filesystem.yml
  loop: "{{ storage_filesystems }}"
  loop_control:
    loop_var: filesystem
  when:
    - storage_filesystems is defined

- name: Include mount.yml
  ansible.builtin.include_tasks:
    file: mount.yml
  loop: "{{ storage_mounts }}"
  loop_control:
    loop_var: mount
  when:
    - storage_mounts is defined
