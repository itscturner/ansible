---
# defaults file for pip

# Required packages to install for pip.
pip_required_packages:
  - "python{{ pip_python_version }}"
  - "python{{ pip_python_version }}-pip"
  - "python{{ pip_python_version }}-setuptools"

# Python version.
pip_python_version:

# Pip executable path. Changes depending on the 'pip_python_version' variable.
pip_executable: "/usr/bin/pip{{ pip_python_version }}"

# Configurations to add to pip.conf. (Section, Option, Value).
pip_configurations: []
