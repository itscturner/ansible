---
# tasks file for pip

- name: Import assert.yml
  ansible.builtin.import_tasks:
    file: assert.yml
  run_once: true
  delegate_to: localhost

- name: Install pip required packages
  ansible.builtin.package:
    name: "{{ pip_required_packages }}"
    state: present

- name: Configure pip
  community.general.ini_file:
    path: /etc/pip.conf
    section: "{{ item.section }}"
    option: "{{ item.option }}"
    value: "{{ item.value }}"
    mode: '0644'
  loop: "{{ pip_configurations }}"
