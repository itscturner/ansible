---
# tasks file for users

- name: Add users
  ansible.builtin.user:
    name: "{{ item.username }}"
    password: "{{ item.password | default(lookup('password')) }}"
    update_password: "{{ item.update_password | default(omit) }}"
    uid: "{{ item.uid | default(omit) }}"
    group: "{{ item.group }}"
    groups: "{{ item.groups | join(',') }}"
    comment: "{{ item.comment | default(omit) }}"
    home: "{{ users_home }}/{{ item.username }}"
    createhome: "{{ item.home_create | default('true') }}"
    shell: "{{ item.shell | default(users_default_shell) }}"
    system: "{{ item.system | default(omit) }}"
    append: "{{ item.append | default(omit) }}"
    generate_ssh_key: "{{ item.ssh_key_generate | default(omit) }}"
    ssh_key_file: ".ssh/id_{{ item.ssh_key_type | default(users_ssh_key_type) }}"
    ssh_key_passphrase: "{{ item.ssh_key_password | default(omit) }}"
    ssh_key_bits: "{{ item.ssh_key_bits | default(users_ssh_key_bits) }}"
  with_items: "{{ users }}"
  no_log: >
    "{{ true if item.password is defined or
      item.authorized_keys is defined else false }}"





- name: Set users home directory permissions
  ansible.builtin.file:
    dest: "{{ users_home }}/{{ item.username }}"
    owner: "{{ item.username }}"
    group: "{{ item.group }}"
    mode: "{{ item.home_mode }}"
  when: item.home_create
  with_items: "{{ users }}"
  no_log: >
    "{{ true if item.password is defined or
      item.authorized_keys is defined else false }}"


- name: Create users ssh directory
  ansible.builtin.file:
    path: "{{ users_home }}/{{ item.username }}/.ssh"
    owner: "{{ item.username }}"
    group: "{{ item.group }}"
    state: directory
    mode: '0700'
  when: item.home_create
  with_items: "{{ users }}"
  no_log: >
    "{{ true if item.password is defined or
     item.authorized_keys is defined else false }}"


- name: Add users authorized keys
  ansible.posix.authorized_key:
    user: "{{ item.username }}"
    key: "{{ item.authorized_keys | default([]) | join('\n') }}"
    exclusive: "{{ item.authorized_keys_exclusive | default('false') }}"
  when: item.home_create
  with_items: "{{ users }}"
  no_log: >
    "{{ true if item.password is defined
     or item.authorized_keys is defined else false }}"



