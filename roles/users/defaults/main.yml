---
# defaults file for users


# users:
#   - username: testuser              (required)
#     name: Test User
#     uid: 1000
#     group: staff
#     password: xxxxx               (a hash created with: mkpasswd)
#     groups: ["adm", "www-data"]
#     append: no                    (only append groups, leave others)
#     home_mode: "0750"
#     home_create: yes
#     home: /home/testuser
#     system: no
#     authorized_keys: []
#     authorized_keys_exclusive: yes
#     ssh_key_type: rsa
#     ssh_key_bits: 2048
#     ssh_key_password: ""
#     ssh_key_generate: no
#     ssh_key: "xxx"
#     shell: /bin/bash
#     update_password: always


# List of users to add.
users: []



# Root directory for users home directory.
users_home: /home


# Default user's primary group for users.
users_group:

# Default user's secondary groups.
users_groups: []


# Default user's home directory permissions.
users_home_mode: '0755'


# Default user's ssh key type.
users_ssh_key_type: rsa

# Default user's ssh key bits.
users_ssh_key_bits: 2048



users_default_shell:



